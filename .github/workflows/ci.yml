name: CI
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          #- macos-latest
          #- windows-latest
    runs-on: ${{ matrix.os }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6
      # Setup
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Configure Python for Windows
        run: |
          $pythonPath = (Get-Command python).Source
          $pythonDir = Split-Path $pythonPath
          $python3Path = Join-Path $pythonDir "python3.exe"
          if (!(Test-Path $python3Path)) {
            New-Item -ItemType HardLink -Path $python3Path -Value $pythonPath
            Write-Host "Created python3.exe hardlink"
          }
          & pnpm config set python "$pythonPath"
          Write-Host "Configured pnpm python to $pythonPath"
        if: runner.os == 'Windows'
        shell: pwsh
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      # Lint
      - name: Lint (Go)
        if: runner.os == 'Linux'
        run: make lint-go
      - name: Lint (Frontend)
        if: runner.os == 'Linux'
        run: make lint-frontend
      - name: Lint (Binaries)
        if: runner.os == 'Linux'
        run: make lint-binaries
      # Build & Test
      - run: make build
      - name: Test
        if: runner.os != 'Linux'
        run: make test
      - name: Coverage
        if: runner.os == 'Linux'
        run: make coverage
      - name: Upload Coverage
        if: runner.os == 'Linux'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out,coverage/lcov.info
      # E2E
      - run: make e2e
      - uses: actions/upload-artifact@v4
        id: playwright-report
        if: always()
        with:
          name: playwright-report-${{ runner.os }}
          path: playwright-report/
          retention-days: 7
      - name: Playwright Report Summary
        if: always()
        run: |
          if [ -f playwright-report/results.json ]; then
            PASSED=$(jq '.stats.expected' playwright-report/results.json)
            FAILED=$(jq '.stats.unexpected' playwright-report/results.json)
            SKIPPED=$(jq '.stats.skipped' playwright-report/results.json)
            FLAKY=$(jq '.stats.flaky' playwright-report/results.json)
            TOTAL=$((PASSED + FAILED + SKIPPED + FLAKY))
            {
              echo "## Playwright Test Results (${{ runner.os }})"
              echo ""
              if [ "$FAILED" -gt 0 ]; then
                echo "| Status | Count |"
                echo "|--------|-------|"
                echo "| :white_check_mark: Passed | $PASSED |"
                echo "| :x: Failed | $FAILED |"
                [ "$FLAKY" -gt 0 ] && echo "| :warning: Flaky | $FLAKY |"
                [ "$SKIPPED" -gt 0 ] && echo "| :fast_forward: Skipped | $SKIPPED |"
                echo ""
              else
                echo ":white_check_mark: **All $TOTAL tests passed on ${{ runner.os }}**"
              fi
              echo ""
              echo ":page_facing_up: Playwright report for ${{ runner.os }} is available as a workflow artifact."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Playwright Report URL
        if: always() && runner.os == 'Linux'
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo ":page_facing_up: [View Playwright Report](${PAGES_URL}/reports/${SHORT_SHA}/)" >> "$GITHUB_STEP_SUMMARY"
        shell: bash
      - name: Deploy Playwright Report to gh-pages
        if: always() && runner.os == 'Linux' && github.ref == 'refs/heads/main'
        env:
          GIT_REMOTE_URL: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: ./.github/deploy-playwright-report.sh
      - name: Upload Pages artifact
        if: always() && runner.os == 'Linux' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.DEPLOY_DIR }}
      - name: Deploy to GitHub Pages
        id: deploy
        if: always() && runner.os == 'Linux' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
