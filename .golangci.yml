version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - dupword
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - gosec
    - godot
    - misspell
    - nilerr
    - nilnil
    - nolintlint
    - perfsprint
    - prealloc
    - revive
    - sqlclosecheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - whitespace
  settings:
    gosec:
      excludes:
        - G117 # Struct fields named Password/Secret are not leaked secrets.
        - G703 # Taint-based path traversal: too many false positives.
        - G704 # Taint-based SSRF: flags all http.Client.Do calls.
        - G705 # Taint-based XSS: flags all ResponseWriter.Write calls.
        - G706 # Taint-based log injection: flags structured slog calls.
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    revive:
      rules:
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    rules:
      - path: (.+)\.go$
        text: should have a package comment
      - path: _test\.go$
        text: "G101:"
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
